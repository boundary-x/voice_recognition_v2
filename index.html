<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Voice Controller</title>
  <link rel="icon" href="https://raw.githubusercontent.com/boundary-x/ai_teachable_machine/refs/heads/main/Favicon.png"/> 
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.dom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <header>
    <div class="title">
      <img src="https://raw.githubusercontent.com/boundary-x/ai_voice_recognition/refs/heads/main/boundaryx_logo.png" alt="Logo">
      AI Voice Controller
    </div>
    <a href="https://boundaryx.io/59" class="back-button">돌아가기</a>
  </header>

  <main>
    <div id="p5-container" class="canvas-container"></div>
    
    <section class="controls">
      
      <div class="control-group" id="bluetooth-control-group">
        <h3>1. 기기 연결</h3>
        <p>마이크로비트와 블루투스로 연결하여 통신을 시작합니다.</p>
        <div id="bluetoothStatus">상태: 연결 대기 중</div>
        <div id="bluetooth-control-buttons" class="button-group" style="margin-top: 1.5rem;"></div>
      </div>

      <div class="control-group" id="command-table-group">
        <h3>2. 명령어 데이터셋</h3>
        <p>AI가 인식할 수 있는 음성 명령어와 매핑된 데이터입니다.</p>
        <div id="command-table-container"></div>
      </div>

      <div class="control-group" id="user-command-group">
        <h3>3. 명령어 추가</h3>
        <p>새로운 명령어를 등록하거나 엑셀 파일로 데이터를 관리하세요.</p>
        <div id="user-command-ui"></div>
        <input type="file" id="excelInput" accept=".xlsx, .xls" style="display: none;" />
      </div>

      <div class="control-group" id="voice-recognition-group">
        <h3>4. 음성 제어</h3>
        <p>버튼을 <b>누른 상태</b>에서 명령을 말하고, <b>떼면</b> 전송이 완료됩니다.</p>
        <div id="voice-recognition-ui"></div>
        <div id="status-container"></div>
      </div>

    </section>
  </main>

  <footer>
    <p>© 2024 Boundary X Co. All rights reserved.</p>
  </footer>

  <script src="sketch.js" defer></script>
  <script>
    // 단순 뒤로가기 기능
    document.querySelector('.back-button').addEventListener('click', (e) => {
        // href가 있으면 이동하되, preventDefault 제어 가능
    });
  </script>
</body>
</html>
